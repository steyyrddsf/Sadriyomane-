.input-group label{

.input-group input,

.action-grid{

.action-btn{

.card{

}

.card img{
width:100%;
height:220px;

}

.card-content{

.grid-info{

.profile-card{

height:80px;

.menu{

border-radius:18px;
overflow:hidden;
}

.menu-item{
display:flex;
justify-content:space-between;
padding:16px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.nav{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:500px;
background:#fff;
display:grid;
grid-template-columns:repeat(4,1fr);
border-top:1px solid #ddd;
z-index:999;
}

.nav button{

color:#0f172a;

}

.withdraw-body{

.form-group{

flex-direction:column;

.form-group input,
.form-group select{
padding:14px;
border-radius:14px;
border:1px solid #d1d5db;
font-size:14px;
outline:none;
background:#f8fafc;
}

.balance-info{
background:#f1f5f9;
padding:14px;
border-radius:14px;
margin-bottom:18px;
}

.withdraw-btn{
background:linear-gradient(135deg,#d4a437,#f7d774);
}

.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:20px;
}

.stat-card{
background:#fff;
padding:18px;
border-radius:18px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* Styles ajoutés pour le tableau des 3 niveaux de parrainage */
.team-grid {
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:20px;
}
.team-card {
background:#fff;
padding:12px;
border-radius:14px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}
.team-card h4 {
font-size:13px;
color:#64748b;
}
.team-card p {

}
.team-table {

background:#fff;
border-radius:14px;
overflow:hidden;

margin-top:15px;
font-size:13px;
}
.team-table th, .team-table td {
padding:12px;
text-align:left;
border-bottom:1px solid #f1f5f9;
}
.team-table th {
background:#0f172a;
color:#fff;
font-weight:500;
}
.badge-level {
padding:4px 8px;
border-radius:8px;
font-size:11px;
font-weight:600;
background:#f1f5f9;
color:#0f172a;

</style>
</head>
<body>

<button onclick="showPage('orders')">🚀</button>

<script>

function updatePhoneCode(){

const country = document.getElementById('country').value;
document.getElementById('phoneCode').innerText = country;

}

updatePhoneCode();

const auth = document.getElementById('auth');
const app = document.getElementById('app');

const home = document.getElementById('home');
const ordersPage = document.getElementById('orders');
const teamPage = document.getElementById('team');
const mePage = document.getElementById('me');

let users = JSON.parse(localStorage.getItem('users')) || [];
let orders = JSON.parse(localStorage.getItem('orders')) || [];
let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

let user = null;

/* ================= PRODUITS PREMIUM ================= */

const products = [

{

},

{

  daily:129984,

  badge:"Executive",
  color:"#ffcc33",
  img:"https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1200&auto=format&fit=crop"
},

{

  badge:"Royal",
  color:"#f0b90b",
  img:"https://images.unsplash.com/photo-1507679799987-c73779587ccf?q=80&w=1200&auto=format&fit=crop"
},

{
  id:8,
  name:"VIP 8",
  subtitle:"Prestige Max",
  price:550000,

  total:4124880,
  duration:10,
  badge:"Prestige",
  color:"#f7c948",
  img:"https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1200&auto=format&fit=crop"
},

{

  duration:10,
  badge:"Imperial",

  img:"https://images.unsplash.com/photo-1460317442991-0ec209397118?q=80&w=1200&auto=format&fit=crop"
},

{

  daily:800400,
  total:8004000,
  duration:10,
  badge:"Ultra VIP",
  color:"#ffb703",
  img:"https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=1200&auto=format&fit=crop"
}

];

function save(){

localStorage.setItem('users',JSON.stringify(users));
localStorage.setItem('orders',JSON.stringify(orders));
localStorage.setItem('transactions',JSON.stringify(transactions));

}

function updateCurrentUser(){

const index = users.findIndex(u=>u.id===user.id);

if(index !== -1){
users[index] = user;
}

save();

}

function register(){

const phone = document.getElementById('phone').value.trim();
const pass = document.getElementById('pass').value.trim();
const ref = document.getElementById('ref').value.trim();

if(!phone || !pass){
alert('Veuillez remplir tous les champs');
return;
}

if(users.find(u=>u.phone===phone)){
alert('Compte déjà existant');
return;
}

const newUser = {
id:Date.now(),
phone,
password:pass,
balance:500,
code:'AI'+Math.random().toString(36).substring(2,8),
referrer:ref
};

users.push(newUser);
save();

alert('Compte créé avec succès. Bonus d\'inscription de 500 FCFA accordé !');

}

function login(){

const phone = document.getElementById('phone').value.trim();
const pass = document.getElementById('pass').value.trim();

const foundUser = users.find(
u=>u.phone===phone && u.password===pass
);

if(!foundUser){
alert('Identifiants incorrects');
return;
}

user = foundUser;

auth.style.display='none';
app.style.display='block';

document.getElementById('userId').innerText = user.phone;

renderAll();

}

function logout(){

user = null;
auth.style.display='block';
app.style.display='none';

}

function showPage(page){

document.querySelectorAll('.page')
.forEach(p=>p.classList.remove('active'));

document.getElementById(page)
.classList.add('active');

}

function renderHome(){

let gains = transactions
.filter(t=>t.user_id===user.id && t.type==='gain')
.reduce((sum,t)=>sum+t.amount,0);

home.innerHTML = `

<img class="banner"
src="https://mir-s3-cdn-cf.behance.net/project_modules/max_1200/5e342a106822209.5f992383e20e8.jpg">

<div class="balance-box">
<p>Solde disponible</p>
<h1>${user.balance.toLocaleString()} FCFA</h1>
<div class="vip-status">Compte VIP Actif</div>
</div>

<div class="stats-grid">
<div class="stat-card">
<h3>${gains.toLocaleString()}</h3>
<p>Revenus</p>
</div>

<div class="stat-card">
<h3>${orders.filter(o=>o.user_id===user.id).length}</h3>
<p>VIP actifs</p>
</div>
</div>

<div class="action-grid">
<div class="action-btn" onclick="deposit()">💳<br>Dépôt</div>
<div class="action-btn" onclick="withdraw()">🏧<br>Retrait</div>
<div class="action-btn" onclick="showPage('orders')">🚀<br>VIP</div>
<div class="action-btn" onclick="showPage('team')">👥<br>Équipe</div>
</div>
`;

products.forEach((p,index)=>{

home.innerHTML += `
<div class="card">
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div class="grid-info">
<p>Prix : <b>${p.price} FCFA</b></p>
<p>Jour : <b>${p.daily} FCFA</b></p>
<p>Total : <b>${p.total} FCFA</b></p>
<p>Durée : <b>${p.duration} jours</b></p>
</div>
<button class="btn-primary" onclick="buy(${index})">
Activer l'investissement
</button>
</div>
</div>
`;

});

}

function buy(index){

const p = products[index];

if(user.balance < p.price){
alert('Solde insuffisant');
return;
}

user.balance -= p.price;

orders.push({
id:Date.now(),
user_id:user.id,
product:p.name,
daily:p.daily,
lastClaim: 0,
purchaseTime: Date.now(),
image: p.img
});

transactions.push({
user_id:user.id,
type:'achat',
amount:p.price,
date:new Date().toLocaleString()
});

/* --- LOGIQUE DE DISTRIBUTION AUTOMATIQUE DU PARRAINAGE SUR 3 NIVEAUX --- */
// Niveau 1 : 27%
if (user.referrer) {
  let parent1 = users.find(u => u.code === user.referrer);
  if (parent1) {
    let bonus1 = p.price * 0.27;
    parent1.balance += bonus1;
    transactions.push({
      user_id: parent1.id,
      type: `Bonus Parrainage (Niveau 1 - Filleul: ${user.phone})`,
      amount: bonus1,
      date: new Date().toLocaleString()
    });

    // Niveau 2 : 2%
    if (parent1.referrer) {
      let parent2 = users.find(u => u.code === parent1.referrer);
      if (parent2) {
        let bonus2 = p.price * 0.02;
        parent2.balance += bonus2;
        transactions.push({
          user_id: parent2.id,
          type: `Bonus Parrainage (Niveau 2 - Filleul: ${user.phone})`,
          amount: bonus2,
          date: new Date().toLocaleString()
        });

        // Niveau 3 : 1%
        if (parent2.referrer) {
          let parent3 = users.find(u => u.code === parent2.referrer);
          if (parent3) {
            let bonus3 = p.price * 0.01;
            parent3.balance += bonus3;
            transactions.push({
              user_id: parent3.id,
              type: `Bonus Parrainage (Niveau 3 - Filleul: ${user.phone})`,
              amount: bonus3,
              date: new Date().toLocaleString()
            });
          }
        }
      }
    }
  }
}

updateCurrentUser();
renderAll();

alert('VIP activé avec succès');

}

function renderOrders(){

const myOrders = orders.filter(o=>o.user_id===user.id);

ordersPage.innerHTML = '<h2>Mes investissements</h2><br>';

if(myOrders.length===0){
ordersPage.innerHTML += '<p>Aucun investissement actif</p>';
return;
}

myOrders.forEach(order=>{

const maintenant = Date.now();
const tempsEcoule = maintenant - (order.lastClaim || order.purchaseTime);
const reste24h = 86400000 - tempsEcoule;

let formatHeureAchat = new Date(order.purchaseTime).toLocaleString('fr-FR');
let boutonTexte = "Réclamer le gain";
let boutonDisabled = "";

if (reste24h > 0) {
  const dateDeblocage = new Date(maintenant + reste24h);
  const options = { hour: '2-digit', minute: '2-digit' };
  boutonTexte = `Disponible demain à ${dateDeblocage.toLocaleTimeString('fr-FR', options)}`;
  boutonDisabled = "disabled style='background:#ccc; cursor:not-allowed; transform:none;'";
}

ordersPage.innerHTML += `
<div class="card">
<img src="${order.image || 'https://via.placeholder.com/150'}" style="width:100%; height:220px; object-fit:cover;">
<div class="card-content">
<h3>${order.product}</h3>
<p style="margin-bottom: 5px; font-size:13px; color:#555;">Acheté le : <b>${formatHeureAchat}</b></p>
<p style="margin-bottom: 15px;">Gain journalier : <b>${order.daily} FCFA</b></p>
<button class="btn-primary" ${boutonDisabled} onclick="claim(${order.id})">
${boutonTexte}
</button>
</div>
</div>
`;

});

}

function claim(id){

const order = orders.find(o=>o.id===id);

if(!order) return;

const maintenant = Date.now();
const tempsEcoule = maintenant - (order.lastClaim || order.purchaseTime);

if(tempsEcoule < 86400000){
alert('Déjà réclamé aujourd’hui. Revenu disponible toutes les 24h.');
return;
}

order.lastClaim = maintenant;
user.balance += order.daily;

transactions.push({
user_id:user.id,
type:'gain',
amount:order.daily,
date:new Date().toLocaleString()
});

updateCurrentUser();
renderAll();

alert('Gain réclamé');

}

function renderTeam(){

const link = window.location.origin +
window.location.pathname + '?ref=' + user.code;

/* --- RECHERCHE ET CALCUL AUTOMATIQUE DU PARRAINAGE EN 3 NIVEAUX --- */
let level1 = [];
let level2 = [];
let level3 = [];

// Trouver le Niveau 1 (ceux qui ont utilisé le code de l'utilisateur en cours)
level1 = users.filter(u => u.referrer === user.code);

// Trouver le Niveau 2 (ceux qui ont utilisé le code des membres du Niveau 1)
level1.forEach(u1 => {
  let subTeam = users.filter(u => u.referrer === u1.code);
  level2 = level2.concat(subTeam);
});
// Trouver le Niveau 3 (ceux qui ont utilisé le code des membres du Niveau 2)
level2.forEach(u2 => {
  let subTeam = users.filter(u => u.referrer === u2.code);
  level3 = level3.concat(subTeam);
});

const modal = document.createElement('div');
modal.className = 'withdraw-modal';

modal.innerHTML = `

<option>MTN Mobile Money</option>
</select>
</div>

<div class="form-group">

</div>

</div>

<b>${user.balance.toLocaleString()} FCFA</b>
</div>

<button class="withdraw-btn" id="confirmWithdraw">
Confirmer le retrait
</button>

</div>
</div>
`;
document.body.appendChild(modal);

modal.addEventListener('click',(e)=>{
if(e.target===modal){
modal.remove();
}
});

document.getElementById('closeWithdraw').onclick = ()=>{
modal.remove();
};

document.getElementById('confirmWithdraw').onclick = ()=>{

const amount = Number(
document.getElementById('withdrawAmount').value
);

if(!amount || amount<=0){
alert('Montant invalide');
return;
}

if(amount > user.balance){
alert('Solde insuffisant');
return;
}

user.balance -= amount;

transactions.push({
user_id:user.id,
type:'retrait',
amount,
status:'En attente',
date:new Date().toLocaleString()
});

updateCurrentUser();
renderAll();

alert('Retrait envoyé avec succès');

modal.remove();

};

}

alert('Installation non disponible actuellement');
return;
}

deferredPrompt.prompt();
await deferredPrompt.userChoice;

}
