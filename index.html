<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Snake</title>

<style>
body{
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

canvas{
    background:#111;
    border:3px solid lime;
}
</style>
</head>

<body>

<canvas id="jeu" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("jeu");
const ctx = canvas.getContext("2d");

const taille = 20;

let serpent = [
    {x: 200, y: 200},
    {x: 180, y: 200},
    {x: 160, y: 200}
];

let nourriture = {
    x: 300,
    y: 200
};

let vitesseX = taille;
let vitesseY = 0;

document.addEventListener("keydown", touche);

function touche(e){

    console.log("Touche :", e.key);

    if(e.key === "ArrowUp" && vitesseY === 0){
        vitesseX = 0;
        vitesseY = -taille;
    }

    if(e.key === "ArrowDown" && vitesseY === 0){
        vitesseX = 0;
        vitesseY = taille;
    }

    if(e.key === "ArrowLeft" && vitesseX === 0){
        vitesseX = -taille;
        vitesseY = 0;
    }

    if(e.key === "ArrowRight" && vitesseX === 0){
        vitesseX = taille;
        vitesseY = 0;
    }
}

function dessiner(){

    // Fond
    ctx.fillStyle = "black";
    ctx.fillRect(0,0,400,400);

    // Nourriture
    ctx.fillStyle = "red";
    ctx.fillRect(nourriture.x, nourriture.y, taille, taille);

    // Nouvelle tête
    let tete = {
        x: serpent[0].x + vitesseX,
        y: serpent[0].y + vitesseY
    };

    serpent.unshift(tete);

    // Manger nourriture
    if(tete.x === nourriture.x && tete.y === nourriture.y){

        console.log("Nourriture mangée");

        nourriture = {
            x: Math.floor(Math.random()*20) * taille,
            y: Math.floor(Math.random()*20) * taille
        };

    } else {
        serpent.pop();
    }

    // Dessin serpent
    for(let i = 0; i < serpent.length; i++){

        if(i === 0){
            ctx.fillStyle = "lime";
        }else{
            ctx.fillStyle = "green";
        }

        ctx.fillRect(
            serpent[i].x,
            serpent[i].y,
            taille,
            taille
        );
    }

    // Collision mur
    if(
        tete.x < 0 ||
        tete.y < 0 ||
        tete.x >= 400 ||
        tete.y >= 400
    ){
        console.log("GAME OVER");
        clearInterval(game);
        alert("GAME OVER");
    }
}

console.log("Jeu démarré");

let game = setInterval(dessiner, 120);
</script>

</body>
</html>
